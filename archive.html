<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- BUG 1: viewport meta tag missing — mobile won't scale -->
  <title>TaskFlow - Archive</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>
<div class="shell">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">TaskFlow</span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Menu</div>
      <!-- BUG 2: href paths missing .html extension -->
      <a href="index" class="nav-item">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="tasks" class="nav-item">
        <span class="nav-icon">✅</span> Tasks
        <span class="nav-badge" id="sidebar-task-count">0</span>
      </a>
      <a href="archive" class="nav-item active">
        <span class="nav-icon">📦</span> Archive
      </a>
      <a href="settings" class="nav-item">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </div>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">JD</div>
        <div class="user-info">
          <div class="user-name">Jamie Doe</div>
          <div class="user-role">Developer</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ===== CONTENT ===== -->
  <div class="content">

    <header class="topbar">
      <h1 class="topbar-title">Archive</h1>
      <div class="topbar-actions">
        <a href="tasks.html" class="btn btn-ghost">← Back to Tasks</a>
      </div>
    </header>

    <main class="page-body">

      <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:1.2rem;">
        Archived tasks are removed from the active board. Restore them anytime to bring them back.
      </p>

      <div class="archive-table-wrap">
        <div class="archive-search-bar">
          <input type="text" id="archive-search" class="search-box" placeholder="Search archived tasks…" style="max-width:300px;" />
        </div>

        <table class="table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Priority</th>
              <th>Due Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="archive-list">
            <tr>
              <td colspan="5" style="text-align:center;color:var(--text-muted);padding:2.5rem;">
                Archive is empty.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
</div>

<div class="toast-container"></div>

<script src="js/app.js"></script>
<script src="js/ui.js"></script>
<script>
  const count = loadTasks().filter(t => !t.archived && !t.done).length;
  const badge = document.getElementById('sidebar-task-count');
  if (badge) badge.textContent = count;
</script>
</body>
</html>
